<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 268 72" fill="none">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2e6127"/>
      <stop offset="100%" stop-color="#1a3d14"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c9a227"/>
      <stop offset="50%" stop-color="#f0d87a"/>
      <stop offset="100%" stop-color="#c9a227"/>
    </linearGradient>
  </defs>

  <!-- Shield shadow -->
  <path d="M6 8 L66 8 L66 45 C66 62 36 73 36 73 C36 73 6 62 6 45Z"
        fill="#0d2009" opacity="0.18"/>

  <!-- Shield body -->
  <path d="M5 5 L65 5 L65 43 C65 60 35 71 35 71 C35 71 5 60 5 43Z"
        fill="url(#shieldGrad)"/>

  <!-- Gold chief (top band) -->
  <path d="M5 5 L65 5 L65 18 L5 18Z" fill="url(#goldGrad)"/>

  <!-- Inner shield outline for depth -->
  <path d="M10 18 L60 18 L60 42 C60 57 35 67 35 67 C35 67 10 57 10 42Z"
        fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1.2"/>

  <!-- Star on gold band -->
  <polygon points="35,7.5 36.5,12 41,12 37.5,14.5 39,19 35,16.5 31,19 32.5,14.5 29,12 33.5,12"
           fill="#1a3d14" opacity="0.6"/>

  <!-- H — left vertical bar -->
  <rect x="15" y="23" width="6.5" height="29" rx="1.5" fill="white"/>
  <!-- H — right vertical bar -->
  <rect x="48.5" y="23" width="6.5" height="29" rx="1.5" fill="white"/>
  <!-- H — crossbar -->
  <rect x="15" y="35" width="40" height="5.5" rx="1.5" fill="white"/>

  <!-- Separator -->
  <line x1="78" y1="7" x2="78" y2="65" stroke="#ddebd8" stroke-width="1.2"/>

  <!-- HASBU -->
  <text x="90" y="37"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-size="28" font-weight="900"
    fill="#1a3d14"
    letter-spacing="-0.5">HASBU</text>

  <!-- INVESTMENT LIMITED -->
  <text x="91" y="54"
    font-family="Arial, 'Helvetica Neue', sans-serif"
    font-size="10" font-weight="700"
    fill="#c9a227"
    letter-spacing="2.2">INVESTMENT LIMITED</text>
</svg>
