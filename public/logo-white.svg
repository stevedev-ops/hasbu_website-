<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 268 72" fill="none">
  <defs>
    <linearGradient id="shieldGradW" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3d7a34"/>
      <stop offset="100%" stop-color="#2e6127"/>
    </linearGradient>
    <linearGradient id="goldGradW" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c9a227"/>
      <stop offset="50%" stop-color="#f0d87a"/>
      <stop offset="100%" stop-color="#c9a227"/>
    </linearGradient>
  </defs>

  <!-- Shield outline for visibility on dark bg -->
  <path d="M5 5 L65 5 L65 43 C65 60 35 71 35 71 C35 71 5 60 5 43Z"
        fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>

  <!-- Shield body -->
  <path d="M5 5 L65 5 L65 43 C65 60 35 71 35 71 C35 71 5 60 5 43Z"
        fill="url(#shieldGradW)"/>

  <!-- Gold chief -->
  <path d="M5 5 L65 5 L65 18 L5 18Z" fill="url(#goldGradW)"/>

  <!-- Inner shield outline -->
  <path d="M10 18 L60 18 L60 42 C60 57 35 67 35 67 C35 67 10 57 10 42Z"
        fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

  <!-- Star on gold band -->
  <polygon points="35,7.5 36.5,12 41,12 37.5,14.5 39,19 35,16.5 31,19 32.5,14.5 29,12 33.5,12"
           fill="#1a3d14" opacity="0.5"/>

  <!-- H — left vertical -->
  <rect x="15" y="23" width="6.5" height="29" rx="1.5" fill="white"/>
  <!-- H — right vertical -->
  <rect x="48.5" y="23" width="6.5" height="29" rx="1.5" fill="white"/>
  <!-- H — crossbar -->
  <rect x="15" y="35" width="40" height="5.5" rx="1.5" fill="white"/>

  <!-- Separator -->
  <line x1="78" y1="7" x2="78" y2="65" stroke="rgba(255,255,255,0.2)" stroke-width="1.2"/>

  <!-- HASBU — white on dark bg -->
  <text x="90" y="37"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-size="28" font-weight="900"
    fill="white"
    letter-spacing="-0.5">HASBU</text>

  <!-- INVESTMENT LIMITED — light gold -->
  <text x="91" y="54"
    font-family="Arial, 'Helvetica Neue', sans-serif"
    font-size="10" font-weight="700"
    fill="#f0d87a"
    letter-spacing="2.2">INVESTMENT LIMITED</text>
</svg>
